services:
  sam-infer:
    build: .
    image: ghcr.io/anno-universe/sam-interactive-server:latest
    container_name: sam-infer
    ports:
      - "${SERVER_PORT:-8422}:8422"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SAM_MODEL_ID=${SAM_MODEL_ID:-facebook/sam-vit-base}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8422
      - PROVIDER_API_KEY=${PROVIDER_API_KEY:-changeme}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - DEVICE=${DEVICE:-}
      - AUTH_HEADER=${AUTH_HEADER:-X-API-Key}
      - TOKEN_TTL_SECONDS=${TOKEN_TTL_SECONDS:-3600}
      - TOKEN_HEADER=${TOKEN_HEADER:-X-Session-Token}
    volumes:
      # HF 下载的权重落到宿主机目录（把 HF_CACHE_DIR 指向 JuiceFS 挂载点即可外部存储）。
      # 例如：HF_CACHE_DIR=/mnt/juicefs/sam-infer/hf-cache
      - ${HF_CACHE_DIR:-./hf-cache}:/app/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
